# ============================================================
# Mutation: Update Order Status
# ============================================================
mutation UpdateOrderStatus {
  updateOrderStatus(
    id: "ord-004"
    status: CONFIRMED
  ) {
    id
    status
    updatedAt
    buyer {
      name
    }
  }
}

# ============================================================
# Mutation: Update Order Status to Shipped
# ============================================================
mutation ShipOrder {
