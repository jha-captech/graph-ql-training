# Sample operations for manual exploration of Stage 12: Orders and Transactions
# Note: Use authentication tokens in Authorization header

# ============================================================
# Query: Single Order by ID
# ============================================================
query GetOrder {
  order(id: "ord-001") {
    id
    status
    total
    createdAt
    buyer {
      id
      name
      email
    }
    items {
      id
      quantity
      unitPrice
      product {
        id
        title
        price
      }
    }
  }
}

# ============================================================
# Query: All Orders (requires appropriate permissions)
# ============================================================
query GetAllOrders {
  orders {
    id
    status
    total
    createdAt
    buyer {
      name
    }
    items {
      quantity
      unitPrice
      product {
        title
      }
    }
  }
}

# ============================================================
# Query: Orders as Customer (own orders only)
# ============================================================
query GetMyOrders {
  me {
    id
    name
  }
  orders {
    id
    status
    total
    createdAt
    items {
      quantity
      unitPrice
      product {
        title
        price
      }
    }
  }
}

# ============================================================
# Mutation: Place Order
# ============================================================
mutation PlaceOrder {
  placeOrder(
    input: {
      items: [
        { productId: "prod-001", quantity: 2 }
        { productId: "prod-005", quantity: 1 }
      ]
    }
  ) {
    __typename
    ... on PlaceOrderSuccess {
      order {
        id
        status
        total
        createdAt
        buyer {
          name
        }
        items {
          id
          quantity
          unitPrice
          product {
            id
            title
            price
          }
        }
      }
    }
    ... on ValidationError {
      message
      field
      code
    }
  }
}

