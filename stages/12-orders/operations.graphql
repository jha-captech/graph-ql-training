# ============================================================
# Mutation: Place Order with Variables
# ============================================================
mutation PlaceOrderWithVariables($items: [OrderItemInput!]!) {
  placeOrder(input: { items: $items }) {
    __typename
    ... on PlaceOrderSuccess {
      order {
        id
        total
        items {
          quantity
          unitPrice
        }
      }
    }
    ... on ValidationError {
      message
      code
    }
  }
}

# Example variables:
# {
#   "items": [
#     { "productId": "prod-001", "quantity": 2 },
#     { "productId": "prod-005", "quantity": 1 }
#   ]
# }

# ============================================================
# Query: Order Status Enum Values
# ============================================================
query OrderStatusEnumValues {
  __type(name: "OrderStatus") {
    enumValues {
      name
    }
  }
}

