    id
    name
    email
    reviews {
      id
      rating
      product {
        title
        pricing {
          amount
        }
      }
      createdAt
    }
  }

  orders {
    id
    status
    total
    items {
      product {
        title
      }
      quantity
      unitPrice
    }
  }
}
