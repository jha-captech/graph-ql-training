# ============================================================================
# FEDERATION CONCEPTS: Entity resolution examples
# ============================================================================

# How a subgraph might resolve entity references
# (This is conceptual - actual _entities queries are internal to the gateway)
#
# The gateway would call:
# query($_representations: [_Any!]!) {
#   _entities(representations: $_representations) {
#     ... on Product {
#       id
#       title
#       pricing {
#         amount
#       }
#     }
#     ... on User {
#       id
#       name
#       email
#     }
#   }
# }
#
# With variables:
# {
#   "_representations": [
#     { "__typename": "Product", "id": "prod-001" },
#     { "__typename": "User", "id": "user-001" }
#   ]
# }

# ============================================================================
# VALID COMPLEX QUERIES: Should pass complexity checks
# ============================================================================

# Complex but optimized query
query OptimizedComplexQuery {
  productsConnection(first: 5) {
    edges {
      node {
        id
        title
        pricing {
          amount
          currency
        }
        averageRating
        seller {
          name
        }
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

# Query with variables for pagination
query PaginatedProducts($first: Int!, $after: String) {
  productsConnection(first: $first, after: $after) {
    edges {
      node {
        id
        title
        pricing {
          amount
          currency
        }
      }
      cursor
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    totalCount
  }
}

# Query combining multiple root fields safely
query DashboardQuery {
  me {
    id
    name
    email
    role
  }

  recentOrders: orders {
    id
    status
    total
    createdAt
  }

  featuredProducts: productsConnection(first: 5) {
    edges {
      node {
        id
        title
        pricing {
          amount
          currency
        }
      }
    }
  }
}

