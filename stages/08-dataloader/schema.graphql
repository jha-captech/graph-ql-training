# Same schema as stage 07 — this stage teaches DataLoader optimization,
# not new schema additions.

interface Node {
  id: ID!
}

interface Timestamped {
  createdAt: String!
  updatedAt: String!
}

type Query {
  node(id: ID!): Node
  search(term: String!): [SearchResult!]!
  product(id: ID!): Product
  products: [Product!]!
  category(id: ID!): Category
  categories: [Category!]!
  user(id: ID!): User
  users: [User!]!
}

type Mutation {
  createProduct(input: CreateProductInput!): CreateProductPayload!
  updateProduct(id: ID!, input: UpdateProductInput!): UpdateProductPayload!
  createReview(input: CreateReviewInput!): CreateReviewPayload!
}

union SearchResult = Product | Category | User

type Product implements Node & Timestamped {
  id: ID!
  title: String!
  description: String
  price: Float!
  inStock: Boolean!
  status: ProductStatus!
  categories: [Category!]!
  reviews: [Review!]!
  averageRating: Float
  createdAt: String!
  updatedAt: String!
}

type Category implements Node {
  id: ID!
  name: String!
  products: [Product!]!
}

type User implements Node & Timestamped {
  id: ID!
  email: String!
  name: String!
  reviews: [Review!]!
  createdAt: String!
  updatedAt: String!
}

type Review implements Node & Timestamped {
  id: ID!
  rating: Int!
  body: String
  author: User!
  product: Product!
  createdAt: String!
  updatedAt: String!
}

enum ProductStatus {
  DRAFT
  ACTIVE
  ARCHIVED
}

input CreateProductInput {
  title: String!
  description: String
  price: Float!
  categoryIds: [ID!]
}

input UpdateProductInput {
  title: String
  description: String
  price: Float
  status: ProductStatus
}

input CreateReviewInput {
  productId: ID!
  rating: Int!
  body: String
}

type CreateProductPayload {
  product: Product
}

type UpdateProductPayload {
  product: Product
}

type CreateReviewPayload {
  review: Review
}
