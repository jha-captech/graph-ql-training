    createdAt  # DateTime!
  }
}

# ============================================================
# SUBSCRIPTION WITH CUSTOM SCALARS
# ============================================================

subscription OrderUpdatesWithTypedFields {
  orderStatusChanged(orderId: "ord-001") {
    id
    status
    buyer {
      email  # EmailAddress!
      createdAt  # DateTime!
    }
    updatedAt  # DateTime!
  }
}

# ============================================================
# COMPLEX QUERY TESTING EVERYTHING
# ============================================================

query CompleteTypedQuery {
  me {
    id
    name
    email  # EmailAddress!
    createdAt  # DateTime!
  }
  product(id: "prod-001") {
    id
    title
    pricing {
      amount  # Money!
      currency
      compareAtAmount  # Money (nullable)
    }
    reviews {
      rating
      author {
        email  # EmailAddress!
      }
      createdAt  # DateTime!
    }
    shippingEstimate(zipCode: "10001") {  # @cacheControl
      provider
      days
      cost
    }
  }
}

