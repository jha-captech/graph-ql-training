# ============================================================
# SCHEMA EVOLUTION - OLD VS NEW PATTERNS
# ============================================================

# Old pattern (still works due to backwards compatibility)
query OldPricePattern {
  product(id: "prod-001") {
    id
    title
    price  # Deprecated but functional
  }
}

# New pattern (structured pricing)
query NewPricingPattern {
  product(id: "prod-001") {
    id
    title
    pricing {
      amount
      currency
      compareAtAmount  # New field for sale/discount display
    }
  }
}

# Side-by-side comparison
query CompareOldAndNew {
  product(id: "prod-001") {
    id
    title
    oldPrice: price  # Alias for comparison
    pricing {
      amount
      currency
      compareAtAmount
    }
  }
}

# ============================================================
# PAGINATION WITH CUSTOM SCALARS
# ============================================================

query ProductsConnectionWithTypedFields {
  productsConnection(first: 5) {
    edges {
      node {
        id
        title
        pricing {
          amount  # Money!
          currency
        }
        createdAt  # DateTime!
        updatedAt  # DateTime!
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

