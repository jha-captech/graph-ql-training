# Sample operations for manual exploration of Stage 10: Error Handling

# ============================================================
# Successful Product Creation (Union Success Path)
# ============================================================
mutation CreateValidProduct {
  createProduct(
    input: {
      title: "Test Product"
      description: "A valid test product"
      price: 9999
      categoryIds: ["cat-001"]
    }
  ) {
    __typename
    ... on CreateProductSuccess {
      product {
        id
        title
        price
      }
    }
    ... on ValidationError {
      message
      field
      code
    }
  }
}

# ============================================================
# Validation Error - Missing Title (Union Error Path)
# ============================================================
mutation CreateProductMissingTitle {
  createProduct(input: { title: "", price: 9999 }) {
    __typename
    ... on CreateProductSuccess {
      product {
        id
        title
      }
    }
    ... on ValidationError {
      message
      field
      code
    }
  }
}

# ============================================================
# Validation Error - Negative Price
# ============================================================
mutation CreateProductNegativePrice {
  createProduct(input: { title: "Invalid Product", price: -100 }) {
    __typename
    ... on CreateProductSuccess {
      product {
        id
        title
        price
      }
    }
    ... on ValidationError {
      message
      field
      code
    }
  }
}

