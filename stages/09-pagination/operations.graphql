# Sample operations for manual exploration of Stage 09: Pagination

# ============================================================
# Basic Pagination - First page of products
# ============================================================
query FirstPageOfProducts {
  productsConnection(first: 10) {
    edges {
      node {
        id
        title
        price
      }
      cursor
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    totalCount
  }
}

# ============================================================
# Forward Pagination - Get next page using cursor
# ============================================================
query NextPageOfProducts {
  productsConnection(
    first: 10
    after: "PASTE_CURSOR_FROM_PREVIOUS_QUERY"
  ) {
    edges {
      node {
        id
        title
        price
      }
      cursor
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    totalCount
  }
}

# ============================================================
# Backward Pagination - Get previous page
# ============================================================
query PreviousPageOfProducts {
  productsConnection(
    last: 10
    before: "PASTE_CURSOR_FROM_LATER_PAGE"
  ) {
    edges {
      node {
        id
        title
        price
      }
      cursor
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    totalCount
  }
}

