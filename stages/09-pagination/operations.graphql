# ============================================================
# Rich Product Data - Full product details in paginated response
# ============================================================
query RichProductsPaginated {
  productsConnection(first: 5) {
    edges {
      node {
        id
        title
        description
        price
        inStock
        status
        averageRating
        categories {
          id
          name
        }
        reviews {
          rating
          author {
            name
          }
        }
      }
      cursor
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    totalCount
  }
}

# ============================================================
# Compare Old vs. New API - Deprecated products field
# ============================================================
query DeprecatedProductsList {
  products {
    id
    title
    price
  }
}

# ============================================================
# Verify Backwards Compatibility - Both endpoints work
# ============================================================
query BothEndpoints {
  # Old API (deprecated but still works)
  products {
    id
    title
  }

  # New API (paginated)
  productsConnection(first: 5) {
    edges {
      node {
        id
        title
      }
    }
    totalCount
  }
}

# ============================================================
# Variables Example - Using query variables for pagination
# ============================================================
query ProductsWithVariables(
  $first: Int!
  $after: String
  $filter: ProductFilterInput
) {
  productsConnection(
    first: $first
    after: $after
    filter: $filter
  ) {
    edges {
      node {
        id
        title
        price
        status
      }
      cursor
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      endCursor
    }
    totalCount
  }
}

